<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Composer App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=DotGothic16&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Rubik+Mono+One&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos e identidades tipográficas basadas en la imagen */
        .font-pixel { font-family: 'DotGothic16', sans-serif; }
        .font-serif-brutal { font-family: 'EB Garamond', serif; }
        .font-mono-brutal { font-family: 'Courier Prime', monospace; }
        .font-heavy { font-family: 'Rubik Mono One', sans-serif; }

        /* Estilo para simular el aliasing/pixelado en texto si fuera necesario */
        .pixel-edges {
            image-rendering: pixelated;
        }
    </style>
</head>
<body class="bg-[#f4f3ef] text-gray-900 min-h-screen flex flex-col font-mono-brutal">

    <header class="border-b-4 border-black p-6 bg-white grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
        <div>
            <h1 class="text-2xl font-heavy tracking-tighter text-black">TYPE COMPOSER <span class="text-sm bg-black text-white p-1">v0.1</span></h1>
            <p class="text-xs text-gray-500 mt-1">UX/UI Visual Prototyper</p>
        </div>

        <div class="space-y-2">
            <label class="block text-xs font-bold uppercase tracking-wider">Frase (3 a 6 palabras):</label>
            <div class="flex gap-2">
                <input type="text" id="phraseInput" 
                       value="Regular Italic BOLD Light" 
                       placeholder="Escribe aquí tu frase..." 
                       class="w-full p-2 border-2 border-black focus:outline-none bg-white text-sm" />
                <button onclick="generateLayout()" class="bg-black text-white px-4 py-2 text-sm font-bold active:translate-y-1 transition-transform border-b-4 border-r-4 border-gray-700">
                    GENERAR
                </button>
            </div>
            <p id="errorMessage" class="text-red-600 text-xs hidden font-bold">¡Error: Debe tener entre 3 y 6 palabras!</p>
        </div>

        <div class="flex flex-col md:items-end space-y-2">
            <span class="text-xs font-bold uppercase tracking-wider">Aspect Ratio del Canvas:</span>
            <div class="inline-flex border-2 border-black bg-white p-1 gap-1">
                <button onclick="setAspectRatio('16/9')" id="ratio-16-9" class="px-3 py-1 text-xs font-bold bg-black text-white transition-colors">
                    16:9
                </button>
                <button onclick="setAspectRatio('3/4')" id="ratio-3-4" class="px-3 py-1 text-xs font-bold text-black hover:bg-gray-200 transition-colors">
                    3:4
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4 md:p-8">
        <div id="canvas" 
             class="bg-[#90b4c4] border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] relative overflow-hidden transition-all duration-300 w-full max-w-4xl flex flex-col justify-center p-8 aspect-[16/9]">
            
            <div id="blocksWrapper" class="relative w-full h-full flex flex-col justify-center items-start space-y-2">
                </div>

            <div class="absolute bottom-0 right-4 w-48 h-48 opacity-20 pointer-events-none font-pixel text-9xl text-black select-none leading-none">
                ¶
            </div>
        </div>
    </main>

    <footer class="border-t-2 border-black bg-white p-2 text-xs flex justify-between">
        <span>Status: Ready</span>
        <span>UI/UX Co-Dev v2026</span>
    </footer>

    <script>
        // Configuración de estilos tipográficos asignados por posición/palabra aleatoria
        const textStyles = [
            { font: 'font-serif-brutal text-6xl md:text-7xl font-normal', name: 'Regular Serif' },
            { font: 'font-serif-brutal text-5xl md:text-6xl italic', name: 'Italic Serif' },
            { font: 'font-pixel text-6xl md:text-7xl uppercase font-bold tracking-tight', name: 'Bold Pixel' },
            { font: 'font-mono-brutal text-5xl md:text-6xl font-light', name: 'Light Mono' }
        ];

        // Cambiar el aspecto del Canvas sin deformar
        function setAspectRatio(ratio) {
            const canvas = document.getElementById('canvas');
            const btn169 = document.getElementById('ratio-16-9');
            const btn34 = document.getElementById('ratio-3-4');

            if (ratio === '16/9') {
                canvas.style.aspectRatio = '16 / 9';
                // Clases de Tailwind activas/inactivas para los botones
                btn169.className = "px-3 py-1 text-xs font-bold bg-black text-white";
                btn34.className = "px-3 py-1 text-xs font-bold text-black hover:bg-gray-200";
            } else {
                canvas.style.aspectRatio = '3 / 4';
                canvas.classList.remove('max-w-4xl');
                canvas.classList.add('max-w-xl'); // Ajuste para que el 3:4 no rompa verticalmente en pantallas estándar
                btn34.className = "px-3 py-1 text-xs font-bold bg-black text-white";
                btn169.className = "px-3 py-1 text-xs font-bold text-black hover:bg-gray-200";
            }
        }

        // Generar la estructura de bloques basada en la frase
        function generateLayout() {
            const input = document.getElementById('phraseInput').value.trim();
            const errorMsg = document.getElementById('errorMessage');
            const wrapper = document.getElementById('blocksWrapper');
            
            // Limpiamos espacios dobles y separamos por palabras
            const words = input.split(/\s+/).filter(word => word.length > 0);

            // Validación de UI: mínimo 3, máximo 6 palabras
            if (words.length < 3 || words.length > 6) {
                errorMsg.classList.remove('hidden');
                return;
            }
            errorMsg.classList.add('hidden');
            wrapper.innerHTML = ''; // Limpiar contenedor

            // Generar los repositorios/bloques escalonados
            words.forEach((word, index) => {
                const block = document.createElement('div');
                
                // Color terracota/naranja de la imagen original: #e05a47
                block.className = "bg-[#e05a47] border-2 border-black text-black inline-block px-4 py-2 relative shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] select-none transition-all duration-300";
                
                // Escalona de izquierda a derecha de forma progresiva simulando niveles
                // Cada nivel/palabra se empuja un porcentaje horizontal acumulativo
                const leftOffset = index * 12; 
                block.style.transform = `translateX(${leftOffset}%)`;
                block.style.zIndex = index + 10;

                // Asignar una tipografía única del set (bucle para cubrir si hay más de 4 palabras)
                const styleConfig = textStyles[index % textStyles.length];
                
                // Inyectar el texto con la clase de estilo correspondiente
                block.innerHTML = `<span class="${styleConfig.font} block leading-none">${word}</span>`;
                
                wrapper.appendChild(block);
            });
        }

        // Inicializar la app con la frase por defecto al cargar
        window.onload = function() {
            generateLayout();
        };
    </script>
</body>
</html>
