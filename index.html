<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Composer Agent - Fixed v0.5</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=DotGothic16&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:wght@300;400;500;600&family=Rubik+Mono+One&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-pixel { font-family: 'DotGothic16', sans-serif; }
        .font-serif-brutal { font-family: 'EB Garamond', serif; }
        .font-mono-brutal { font-family: 'Courier Prime', monospace; }
        .font-heavy { font-family: 'Rubik Mono One', sans-serif; }

        /* Fondo de malla de puntos (Dot Grid) exacto al de la referencia */
        .dot-grid {
            background-size: 24px 24px;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        }

        .canvas-workspace {
            position: relative;
            width: 100%;
            height: 100%;
            max-height: 65vh;
            max-width: 85vw;
            margin: auto;
        }

        /* Forzamos visibilidad inicial para evitar fallos de renderizado */
        .node-card {
            position: relative;
            opacity: 1;
            will-change: transform;
        }
    </style>
</head>
<body class="bg-[#0b0c0e] text-[#9da3ae] h-screen w-screen flex overflow-hidden select-none">

    <aside class="w-64 bg-[#0f1115] border-r border-[#1f232b] flex flex-col justify-between shrink-0 h-full">
        <div class="p-4 space-y-6">
            <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-2">
                    <div class="w-5 h-5 bg-white rounded-sm flex items-center justify-center text-black font-black text-xs">A</div>
                    <span class="text-white font-semibold text-sm tracking-wide">Agently</span>
                </div>
                <i data-lucide="sidebar" class="w-4 h-4 text-gray-500 cursor-pointer hover:text-white"></i>
            </div>

            <div class="flex items-center justify-between p-2 bg-[#161920] border border-[#232833] rounded-lg cursor-pointer">
                <div class="flex items-center gap-2">
                    <div class="w-6 h-6 bg-amber-600 rounded-full text-xs text-white flex items-center justify-center font-bold">HP</div>
                    <span class="text-xs text-white font-medium truncate w-32">Harshad's Personal W...</span>
                </div>
                <i data-lucide="chevrons-up-down" class="w-3.5 h-3.5 text-gray-400"></i>
            </div>

            <nav class="space-y-1">
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium text-white bg-[#1e2330] rounded-md border border-[#2d3448]">
                    <i data-lucide="cpu" class="w-4 h-4 text-[#e05a47]"></i> Agents
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded-md hover:bg-[#13161c] hover:text-white transition-colors">
                    <i data-lucide="database" class="w-4 h-4"></i> Knowledge Base
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded-md hover:bg-[#13161c] hover:text-white transition-colors">
                    <i data-lucide="phone" class="w-4 h-4"></i> Phone Numbers
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded-md hover:bg-[#13161c] hover:text-white transition-colors">
                    <i data-lucide="megaphone" class="w-4 h-4"></i> Campaigns
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded-md hover:bg-[#13161c] hover:text-white transition-colors">
                    <i data-lucide="users" class="w-4 h-4"></i> Audience
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-xs font-medium rounded-md hover:bg-[#13161c] hover:text-white transition-colors">
                    <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Analytics
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-[#1f232b] space-y-3 bg-[#0d0f13]">
            <div class="space-y-1.5">
                <div class="flex justify-between text-[10px] uppercase font-bold tracking-wider">
                    <span>Plan</span> <span class="text-white">Basic</span>
                </div>
                <div class="flex justify-between text-[10px]">
                    <span>Credits</span> <span class="text-white">1200 / 2000</span>
                </div>
                <div class="w-full h-1 bg-[#1c202b] rounded-full overflow-hidden">
                    <div class="w-3/5 h-full bg-white rounded-full"></div>
                </div>
            </div>
            <button class="w-full py-2 bg-white text-black font-semibold rounded-md text-xs hover:bg-gray-200 cursor-pointer transition-colors flex items-center justify-center gap-1.5 shadow-sm">
                <i data-lucide="sparkles" class="w-3.5 h-3.5"></i> Upgrade Plan
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full relative">
        
        <header class="h-14 border-b border-[#1f232b] bg-[#0b0c0e] flex items-center justify-between px-6 shrink-0 z-10">
            <div class="flex items-center gap-4">
                <button class="text-xs flex items-center gap-1 hover:text-white cursor-pointer transition-colors">
                    <i data-lucide="chevron-left" class="w-4 h-4"></i> Back to agents
                </button>
                <div class="h-4 w-px bg-[#1f232b]"></div>
                <div class="flex items-center gap-2">
                    <span class="text-sm font-medium text-white">Loan Collection Agent</span>
                    <span class="px-1.5 py-0.5 text-[10px] font-semibold bg-[#1a1d26] border border-[#2d3345] text-gray-400 rounded">Draft</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="flex items-center gap-1 bg-[#13161c] p-1 border border-[#1f232b] rounded-md">
                    <button onclick="setAspectRatio('16/9')" id="ratio-16-9" class="px-2 py-1 text-[11px] font-medium bg-[#1e2330] border border-[#2d3448] text-white rounded cursor-pointer">16:9</button>
                    <button onclick="setAspectRatio('3/4')" id="ratio-3-4" class="px-2 py-1 text-[11px] font-medium text-gray-400 rounded hover:text-white cursor-pointer">3:4</button>
                </div>
                <div class="flex items-center gap-2 bg-[#13161c] px-3 py-1.5 border border-[#1f232b] rounded-md text-[11px]">
                    <span class="text-gray-400">Tamaño Texto:</span>
                    <input type="range" id="textScale" min="15" max="45" value="24" class="w-20 accent-white cursor-pointer" oninput="updateTextScale(this.value)">
                </div>
                
                <input type="text" id="phraseInput" value="Regular Italic BOLD Light" class="bg-[#13161c] border border-[#1f232b] text-white text-xs px-3 py-1.5 rounded-md focus:outline-none focus:border-gray-500 font-medium w-48" placeholder="Frase (3-6 palabras)" oninput="generateLayout()" />

                <button onclick="generateLayout()" class="px-3 py-1.5 bg-white text-black font-semibold rounded-md text-xs hover:bg-gray-200 cursor-pointer transition-colors">
                    Publish Changes
                </button>
            </div>
        </header>

        <main class="flex-1 bg-[#0b0c0e] dot-grid p-8 flex items-center justify-center relative overflow-hidden">
            
            <div id="canvas" class="canvas-workspace aspect-[16/9] border border-dashed border-[#222733] rounded-xl">
                
                <svg id="svgLines" class="absolute inset-0 w-full h-full pointer-events-none z-0"></svg>
                
                <div id="blocksWrapper" class="absolute inset-0 w-full h-full flex items-center justify-between p-8 box-border z-10">
                    </div>

            </div>

        </main>

        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-[#13161c]/90 backdrop-blur-md border border-[#232833] rounded-full p-1.5 flex items-center gap-1 shadow-2xl z-50">
            <button class="p-2 hover:bg-[#1e2330] rounded-full text-white cursor-pointer"><i data-lucide="mouse-pointer" class="w-4 h-4"></i></button>
            <button class="p-2 hover:bg-[#1e2330] rounded-full text-gray-400 hover:text-white cursor-pointer"><i data-lucide="hand" class="w-4 h-4"></i></button>
            <div class="h-4 w-px bg-[#232833] mx-1"></div>
            <button class="p-2 bg-[#1e2330] rounded-full text-white cursor-pointer"><i data-lucide="git-commit" class="w-4 h-4"></i></button>
            <button class="p-2 hover:bg-[#1e2330] rounded-full text-gray-400 hover:text-white cursor-pointer"><i data-lucide="type" class="w-4 h-4"></i></button>
            <button class="p-2 hover:bg-[#1e2330] rounded-full text-gray-400 hover:text-white cursor-pointer"><i data-lucide="image" class="w-4 h-4"></i></button>
            <div class="h-4 w-px bg-[#232833] mx-1"></div>
            <button class="p-2 hover:bg-[#1e2330] rounded-full text-gray-400 hover:text-white cursor-pointer"><i data-lucide="play" class="w-4 h-4"></i></button>
        </div>
    </div>

    <script>
        const textStyles = [
            { font: 'font-serif-brutal font-normal text-[#e05a47]' },
            { font: 'font-serif-brutal italic text-[#e05a47]' },
            { font: 'font-pixel uppercase font-bold tracking-tight text-[#e05a47]' },
            { font: 'font-mono-brutal font-light text-[#e05a47]' }
        ];

        let currentScale = 24;

        function setAspectRatio(ratio) {
            const canvas = document.getElementById('canvas');
            const btn169 = document.getElementById('ratio-16-9');
            const btn34 = document.getElementById('ratio-3-4');

            if (ratio === '16/9') {
                canvas.style.aspectRatio = '16 / 9';
                btn169.className = "px-2 py-1 text-[11px] font-medium bg-[#1e2330] border border-[#2d3448] text-white rounded cursor-pointer";
                btn34.className = "px-2 py-1 text-[11px] font-medium text-gray-400 rounded hover:text-white cursor-pointer";
            } else {
                canvas.style.aspectRatio = '3 / 4';
                btn34.className = "px-2 py-1 text-[11px] font-medium bg-[#1e2330] border border-[#2d3448] text-white rounded cursor-pointer";
                btn169.className = "px-2 py-1 text-[11px] font-medium text-gray-400 rounded hover:text-white cursor-pointer";
            }
            
            // Permitimos que el CSS recalcule las cajas antes de pintar las líneas
            setTimeout(generateLayout, 150);
        }

        function updateTextScale(val) {
            currentScale = val;
            const blocks = document.querySelectorAll('.word-block-text');
            blocks.forEach(block => {
                block.style.fontSize = `${currentScale}px`;
            });
            drawConnections();
        }

        function generateLayout() {
            const input = document.getElementById('phraseInput').value.trim();
            const wrapper = document.getElementById('blocksWrapper');
            const words = input.split(/\s+/).filter(word => word.length > 0);

            if (words.length < 3 || words.length > 6) return;
            wrapper.innerHTML = ''; 

            // Crear las tarjetas de nodos de manera secuencial
            words.forEach((word, index) => {
                const node = document.createElement('div');
                node.className = "node-card bg-[#13161c] border border-[#222733] rounded-xl p-4 w-44 md:w-48 flex flex-col space-y-3 shadow-2xl shrink-0";
                
                // Distribución vertical en niveles limpia usando transformaciones nativas
                const totalHeightRange = 160; 
                const topOffset = index * (totalHeightRange / (words.length - 1 || 1));
                node.style.transform = `translateY(${topOffset}px)`;

                const styleConfig = textStyles[index % textStyles.length];

                node.innerHTML = `
                    <div class="absolute -left-1.5 top-1/2 -translate-y-1/2 w-2.5 h-2.5 bg-[#0b0c0e] border border-[#3f475a] rounded-full z-20 input-port"></div>
                    <div class="flex items-center justify-between text-[10px] text-gray-500 font-medium">
                        <span>Block 0${index + 1}</span>
                        <i data-lucide="more-horizontal" class="w-3.5 h-3.5"></i>
                    </div>
                    <div class="bg-[#0b0c0e] border border-[#1f232b] rounded-lg p-2.5 min-h-[64px] flex items-center justify-center overflow-hidden">
                        <span class="word-block-text ${styleConfig.font} block text-center truncate w-full" style="font-size: ${currentScale}px;">
                            ${word}
                        </span>
                    </div>
                    <div class="text-[9px] text-gray-500 flex items-center gap-1">
                        <span class="hover:text-white transition-colors cursor-pointer">+ Parameters</span>
                    </div>
                    <div class="absolute -right-1.5 top-1/2 -translate-y-1/2 w-2.5 h-2.5 bg-white border border-black rounded-full z-20 output-port"></div>
                `;
                
                wrapper.appendChild(node);
            });

            // Re-renderizar los íconos de la librería Lucide
            lucide.createIcons();

            // Animación controlada con GSAP garantizando que termine antes de calcular el layout del SVG
            gsap.fromTo(".node-card", 
                { scale: 0.9, opacity: 0 },
                { 
                    scale: 1, 
                    opacity: 1, 
                    duration: 0.3, 
                    stagger: 0.05,
                    onComplete: drawConnections
                }
            );
        }

        // MOTOR VECTORIAL EXACTO PARA LAS LÍNEAS DE CONEXIÓN
        function drawConnections() {
            const svg = document.getElementById('svgLines');
            if (!svg) return;
            svg.innerHTML = ''; 

            const nodes = document.querySelectorAll('.node-card');
            const canvasRect = document.getElementById('canvas').getBoundingClientRect();

            if (nodes.length < 2) return;

            for (let i = 0; i < nodes.length - 1; i++) {
                const outPort = nodes[i].querySelector('.output-port');
                const inPort = nodes[i + 1].querySelector('.input-port');

                if (!outPort || !inPort) continue;

                const outRect = outPort.getBoundingClientRect();
                const inRect = inPort.getBoundingClientRect();

                // Puntos relativos exactos dentro del viewport del canvas
                const startX = (outRect.left + outRect.width / 2) - canvasRect.left;
                const startY = (outRect.top + outRect.height / 2) - canvasRect.top;
                const endX = (inRect.left + inRect.width / 2) - canvasRect.left;
                const endY = (inRect.top + inRect.height / 2) - canvasRect.top;

                // Curva Bézier cúbica simétrica estilo diagramación técnica
                const controlX = startX + (endX - startX) * 0.5;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${startX} ${startY} C ${controlX} ${startY}, ${controlX} ${endY}, ${endX} ${endY}`);
                path.setAttribute("stroke", "#3f475a");
                path.setAttribute("stroke-width", "1.5");
                path.setAttribute("fill", "none");
                
                svg.appendChild(path);
            }
        }

        // Ejecución robusta al cargar la página y fuentes
        window.addEventListener('load', () => {
            generateLayout();
            
            // Observador de redimensión del canvas para asegurar que las líneas sigan fijas
            const resizeObserver = new ResizeObserver(() => {
                drawConnections();
            });
            resizeObserver.observe(document.getElementById('canvas'));
        });
    </script>
</body>
</html>
